<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Inter",sans-serif;background:#0b0f19;color:#f3f4f6;min-height:100vh;padding-bottom:40px;}
  
  .top-bar{background:linear-gradient(135deg,#111827 0%,#1f2937 100%);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.35);}
  .top-bar h1{font-size:1.15rem;font-weight:800;color:#f3f4f6;letter-spacing:-0.02em;}
  .top-bar .sub{font-size:0.78rem;color:#9ca3af;margin-top:2px;}
  
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:6px;border:none;font-family:inherit;font-weight:600;font-size:0.83rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
  
  .btn-view{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#d1d5db;}
  .btn-view:hover{background:rgba(255,255,255,.1);color:#fff;}
  .btn-view.active{background:#3b82f6;border-color:#3b82f6;color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.3);}
  
  .btn-print{background:#10b981;color:#fff;box-shadow:0 3px 10px rgba(16,185,129,.25);}
  .btn-print:hover{opacity:.9;transform:translateY(-1px);}
  
  .btn-excel{background:#8b5cf6;color:#fff;box-shadow:0 3px 10px rgba(139,92,246,.25);}
  .btn-excel:hover{opacity:.9;transform:translateY(-1px);}
  
  .meta-bar{display:flex;gap:22px;flex-wrap:wrap;padding:12px 32px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.04);font-size:0.8rem;color:#9ca3af;}
  .meta-bar strong{color:#f3f4f6;}
  
  .tbl-wrap{overflow-x:auto;padding:24px 24px 0 24px;}
  table{width:100%;border-collapse:collapse;font-size:0.8rem;min-width:600px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.2);}
  
  thead tr.h-lbl th{background:#111827;color:#3b82f6;font-weight:700;padding:12px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);font-size:.78rem;}
  thead tr.h-lbl th:first-child,thead tr.h-lbl th:nth-child(2){text-align:left;padding-left:16px;}
  
  thead tr.h-date th{background:rgba(17,24,39,0.7);color:#9ca3af;font-size:.72rem;font-weight:500;padding:6px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);font-style:italic;}
  thead tr.h-date th:first-child,thead tr.h-date th:nth-child(2){text-align:left;padding-left:16px;}
  
  tbody tr:nth-child(even){background:rgba(255,255,255,.01);}
  tbody tr:hover{background:rgba(255,255,255,.03);}
  tbody td{padding:10px 8px;text-align:center;color:#d1d5db;border-bottom:1px solid rgba(255,255,255,.04);font-size:.8rem;}
  tbody td:nth-child(1){color:#9ca3af;font-weight:600;}
  tbody td:nth-child(2){text-align:left;padding-left:16px;font-weight:700;color:#fff;white-space:nowrap;}
  
  td.ab{color:#f87171!important;font-style:italic;font-weight:700;}
  td.tot{font-weight:700;color:#c084fc;}
  td.pct{font-weight:700;}
  td.pct.good{color:#34d399;}
  td.pct.avg{color:#fbbf24;}
  td.pct.low{color:#f87171;}
  
  td.sign-cell{border-left:1.5px solid rgba(255,255,255,.08)!important;width:130px;min-width:130px;background:rgba(255,255,255,0.005);}
  
  tfoot td{background:#111827;color:#c084fc;font-weight:700;padding:8px;border-top:1px solid rgba(255,255,255,.1);text-align:center;font-size:.8rem;}
  tfoot td.label-cell{text-align:left;padding-left:16px;}
  
  .rank-gold{color:#fbbf24;font-size:1.05rem;font-weight:800;text-align:center;}

  @media print{
    body{background:#fff!important;color:#111!important;padding:0!important;}
    .top-bar{background:#1e3a5f!important;color:#fff!important;position:static!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .top-bar h1{color:#fff!important;} .top-bar .sub{color:#ccc!important;}
    .btn-row,.meta-bar{display:none!important;}
    .tbl-wrap{padding:0!important;overflow:visible!important;}
    table{width:100%;border-collapse:collapse;font-size:8pt!important;background:#fff!important;box-shadow:none!important;border:1px solid #ddd!important;}
    thead tr.h-lbl th{background:#1e3a5f!important;color:#fff!important;border:1px solid #1e3a5f!important;}
    thead tr.h-date th{background:#d1dce8!important;color:#1e3a5f!important;border:1px solid #b0bec5!important;}
    tbody tr:nth-child(even){background:#f5f5f5!important;}
    tbody td{border:1px solid #ddd!important;color:#111!important;padding:3px 4px!important;}
    tbody td:nth-child(2){color:#000!important;}
    td.ab{color:#c0392b!important;}
    td.pct.good{color:#0a7c3e!important;}td.pct.avg{color:#b07b00!important;}td.pct.low{color:#c0392b!important;}
    td.sign-cell{border:1px solid #ddd!important;width:110px!important;min-width:110px!important;background:#fff!important;}
    tfoot td{background:#1e3a5f!important;color:#fff!important;border:1px solid #1e3a5f!important;}
    td.tot{color:#1e3a5f!important;}
    @page{size:A4 landscape;margin:5mm 7mm;}
  }
</style>

    if(td) testDates = JSON.parse(td);
  } catch(e) {}
  
  // Force sync PT1 dates
  if(!testDates["7C"]) testDates["7C"] = {};
  if(!testDates["11B"]) testDates["11B"] = {};
  if(!testDates["12"]) testDates["12"] = {};
  testDates["12"].pt1 = "2026-07-03";
  testDates["11B"].pt1 = "2026-07-02";
  testDates["7C"].pt1 = "2026-07-06";
  try {
    localStorage.setItem("student_performance_test_dates", JSON.stringify(testDates));
  } catch(e) {}

  // Fill in studentData and testDates with fallbacks if empty
  ["7C","11B","12"].forEach(cls => {
    if(!studentData[cls]||!studentData[cls].length) {
      studentData[cls] = (fallbackRosters[cls]||[]).slice().sort((a,b)=>a.localeCompare(b)).map((name,i)=>{
        const marks={};
        Object.entries(fallbackMarks[cls]||{}).forEach(([tid,tmap])=>{ if(tmap[name]!==undefined) marks[tid]=tmap[name]; });
        return {rollNo:i+1,name,marks};
      });
    }
    if(!testDates[cls]||!Object.keys(testDates[cls]).length)
      testDates[cls]={...(fallbackDates[cls]||{})};
  });
}

loadData();

const isValidScore = score => score !== undefined && score !== null && score !== "" && score !== 'AB' && !isNaN(Number(score));
const isClassTest = id => id === 'crm' || id.startsWith('ch');

// Compute active class rows data
const conducted = (classTests[activeClass] || []).filter(t => {
  const hasDate = testDates[activeClass] && testDates[activeClass][t.id];
  if (hasDate) return true;
  const classStudents = studentData[activeClass] || [];
  return classStudents.some(s => s.marks && s.marks[t.id] !== undefined && s.marks[t.id] !== null && s.marks[t.id] !== "");
});
const dates     = testDates[activeClass] || {};
const students  = studentData[activeClass] || [];
const colTotals = conducted.map(()=>({sum:0,count:0}));
let gS=0, gP=0, gC=0;

const rows = students.map(student => {
  let tot=0,pos=0;
  const cells = conducted.map((t, ci) => {
    const score = student.marks[t.id];
    const has = isValidScore(score);
    if(has){const n=Number(score);tot+=n;pos+=t.maxMarks;colTotals[ci].sum+=n;colTotals[ci].count+=1;}
    return {has,score};
  });
  const pct = pos>0?(tot/pos*100):null;
  if(pos>0){gS+=tot;gP+=pos;gC++;}
  return {sno:student.rollNo,name:student.name,marks:student.marks,cells,tot,pos,pct};
});
const avgPct = gP>0?(gS/gP*100):null;

const ctTests = conducted.filter(t => isClassTest(t.id));
const ptTests = conducted.filter(t => !isClassTest(t.id));

function fmtDate(raw){if(!raw)return'';const p=raw.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0].slice(2):raw;}
function pc(p){return p>=75?'good':p>=45?'avg':'low';}

function getColAvg(testId) {
  let sum = 0, count = 0;
  rows.forEach(r => {
    const score = r.marks[testId];
    if (isValidScore(score)) {
      sum += Number(score);
      count++;
    }
  });
  return count > 0 ? (sum / count).toFixed(1) : '—';
}

function updateMeta(){
  const avg = avgPct!==null?avgPct.toFixed(1)+'%':'—';
  document.getElementById('metaBar').innerHTML =
    '<span>Students: <strong>'+rows.length+'</strong></span>'+
    '<span>Class Tests: <strong>'+ctTests.length+'</strong></span>'+
    '<span>Periodic Tests: <strong>'+ptTests.length+'</strong></span>'+
    '<span>Class Average: <strong>'+avg+'</strong></span>';
}


function getStatsForTest(testId, maxMarks) {
  let enrolled = rows.length;
  let appeared = 0;
  let passed = 0;
  let failed = 0;
  rows.forEach(r => {
    const score = r.marks[testId];
    if (isValidScore(score)) {
      appeared++;
      const val = Number(score);
      if ((val / maxMarks) * 100 >= 33) {
        passed++;
      } else {
        failed++;
      }
    }
  });
  const pct = appeared > 0 ? ((passed / appeared) * 100).toFixed(1) + '%' : '0.0%';
  return { enrolled, appeared, passed, failed, pct };
}

function getStatsForCTTotal() {
  let enrolled = rows.length;
  let appeared = 0;
  let passed = 0;
  let failed = 0;
  rows.forEach(r => {
    let sumVal = 0, sumPoss = 0;
    ctTests.forEach(t => {
      const score = r.marks[t.id];
      if (isValidScore(score)) {
        sumVal += Number(score);
        sumPoss += t.maxMarks;
      }
    });
    if (sumPoss > 0) {
      appeared++;
      if ((sumVal / sumPoss) * 100 >= 33) {
        passed++;
      } else {
        failed++;
      }
    }
  });
  const pct = appeared > 0 ? ((passed / appeared) * 100).toFixed(1) + '%' : '0.0%';
  return { enrolled, appeared, passed, failed, pct };
}

function getStatsForOverall() {
  let enrolled = rows.length;
  let appeared = 0;
  let passed = 0;
  let failed = 0;
  rows.forEach(r => {
    let sumVal = 0, sumPoss = 0;
    conducted.forEach(t => {
      const score = r.marks[t.id];
      if (isValidScore(score)) {
        sumVal += Number(score);
        sumPoss += t.maxMarks;
      }
    });
    if (sumPoss > 0) {
      appeared++;
      if ((sumVal / sumPoss) * 100 >= 33) {
        passed++;
      } else {
        failed++;
      }
    }
  });
  const pct = appeared > 0 ? ((passed / appeared) * 100).toFixed(1) + '%' : '0.0%';
  return { enrolled, appeared, passed, failed, pct };
}

function buildSheet(){
  let h = '<table style="width:100%;border-collapse:collapse;"><thead><tr class="h-lbl">';
  h += '<th rowspan="2" style="width:40px">S.No</th>';
  h += '<th rowspan="2" style="min-width:140px">Student Name</th>';
  
  if (ctTests.length > 0) {
    h += '<th colspan="' + ctTests.length + '" style="background:#111827;border-bottom:1px solid rgba(255,255,255,0.08)">Class Tests</th>';
    h += '<th rowspan="2" style="background:#111827">CT Total</th>';
    h += '<th rowspan="2" style="background:#111827">CT Avg</th>';
  }
  
  if (ptTests.length > 0) {
    h += '<th colspan="' + ptTests.length + '" style="background:rgba(59,130,246,0.15);border-bottom:1px solid rgba(255,255,255,0.08)">Periodic Tests / Exams</th>';
  }
  h += '<th rowspan="2">Overall Total</th>';
  h += '<th rowspan="2">Percentage</th>';
  h += '<th rowspan="2" style="width:130px;min-width:130px;">Parent\'s Sign</th>';
  h += '</tr>';

  h += '<tr class="h-date">';
  ctTests.forEach(t => {
    const d = dates[t.id] ? fmtDate(dates[t.id]) : '';
    h += '<th>' + t.label + '<br><span style="font-size:0.75em;opacity:0.6">MM:' + t.maxMarks + '</span>' + (d ? '<br><span style="font-size:0.7em;font-weight:normal">' + d + '</span>' : '') + '</th>';
  });
  ptTests.forEach(t => {
    const d = dates[t.id] ? fmtDate(dates[t.id]) : '';
    h += '<th>' + t.label + '<br><span style="font-size:0.75em;opacity:0.6">MM:' + t.maxMarks + '</span>' + (d ? '<br><span style="font-size:0.7em;font-weight:normal">' + d + '</span>' : '') + '</th>';
  });
  h += '</tr></thead><tbody>';

  rows.forEach(r => {
    h += '<tr><td>' + r.sno + '</td><td>' + r.name + '</td>';
    
    let ctTotal = 0, ctPossible = 0;
    ctTests.forEach(t => {
      const score = r.marks[t.id];
      const has = isValidScore(score);
      if (has) {
        h += '<td>' + score + '</td>';
        ctTotal += Number(score);
        ctPossible += t.maxMarks;
      } else {
        h += '<td class="ab">AB</td>';
      }
    });
    
    if (ctTests.length > 0) {
      h += '<td class="tot">' + (ctPossible > 0 ? ctTotal + '/' + ctPossible : '—') + '</td>';
      h += '<td class="pct ' + pc(ctPossible > 0 ? (ctTotal / ctPossible * 100) : 0) + '">' + (ctPossible > 0 ? (ctTotal / ctPossible * 100).toFixed(1) + '%' : '—') + '</td>';
    }
    
    ptTests.forEach(t => {
      const score = r.marks[t.id];
      const has = isValidScore(score);
      if (has) {
        h += '<td>' + score + '</td>';
      } else {
        h += '<td class="ab">AB</td>';
      }
    });

    let overTotal = 0, overPossible = 0;
    conducted.forEach(t => {
      const score = r.marks[t.id];
      if (isValidScore(score)) {
        overTotal += Number(score);
        overPossible += t.maxMarks;
      }
    });
    
    const pctVal = overPossible > 0 ? (overTotal / overPossible * 100) : null;
    
    h += '<td class="tot">' + (overPossible > 0 ? overTotal + '/' + overPossible : '—') + '</td>';
    h += pctVal !== null ? '<td class="pct ' + pc(pctVal) + '">' + pctVal.toFixed(1) + '%</td>' : '<td class="ab">AB</td>';
    h += '<td class="sign-cell"></td>';
    h += '</tr>';
  });

  // Calculate CT total values for aggregate averages
  let sumCTObt = 0, sumCTPoss = 0;
  rows.forEach(r => {
    ctTests.forEach(t => {
      const score = r.marks[t.id];
      if (isValidScore(score)) {
        sumCTObt += Number(score);
        sumCTPoss += t.maxMarks;
      }
    });
  });

  // Calculate Overall total values for aggregate averages
  let sumObt = 0, sumPoss = 0;
  rows.forEach(r => {
    conducted.forEach(t => {
      const score = r.marks[t.id];
      if (isValidScore(score)) {
        sumObt += Number(score);
        sumPoss += t.maxMarks;
      }
    });
  });

  // Helper row builder
  function buildFooterRow(title, cellBuilder) {
    let rowHtml = '<tr><td colspan="2" class="label-cell">' + title + '</td>';
    // CT columns
    ctTests.forEach(t => {
      rowHtml += '<td>' + cellBuilder('ct_test', t.id, t.maxMarks) + '</td>';
    });
    if (ctTests.length > 0) {
      rowHtml += '<td class="tot">' + cellBuilder('ct_tot') + '</td>';
      rowHtml += '<td class="pct">' + cellBuilder('ct_avg') + '</td>';
    }
    // PT columns
    ptTests.forEach(t => {
      rowHtml += '<td>' + cellBuilder('pt_test', t.id, t.maxMarks) + '</td>';
    });
    // Overall columns
    rowHtml += '<td class="tot">' + cellBuilder('over_tot') + '</td>';
    rowHtml += '<td class="pct">' + cellBuilder('over_pct') + '</td>';
    rowHtml += '<td></td></tr>'; // blank for signature
    return rowHtml;
  }

  h += '</tbody><tfoot>';
  
  // 1. Class Average Row
  h += buildFooterRow('📊 Class Average', (type, id, mm) => {
    if (type === 'ct_test' || type === 'pt_test') return getColAvg(id);
    if (type === 'ct_tot') return sumCTPoss > 0 ? (sumCTObt / rows.length).toFixed(1) : '—';
    if (type === 'ct_avg') return sumCTPoss > 0 ? (sumCTObt / sumCTPoss * 100).toFixed(1) + '%' : '—';
    if (type === 'over_tot') return sumPoss > 0 ? (sumObt / rows.length).toFixed(1) : '—';
    if (type === 'over_pct') return sumPoss > 0 ? (sumObt / sumPoss * 100).toFixed(1) + '%' : '—';
  });

  // 2. Enrolled Students Row
  h += buildFooterRow('👥 Enrolled Students', () => rows.length);

  // 3. Appeared in Test Row
  h += buildFooterRow('📝 Appeared in Test', (type, id, mm) => {
    if (type === 'ct_test' || type === 'pt_test') return getStatsForTest(id, mm).appeared;
    if (type === 'ct_tot' || type === 'ct_avg') return getStatsForCTTotal().appeared;
    if (type === 'over_tot' || type === 'over_pct') return getStatsForOverall().appeared;
  });

  // 4. Passed (>= 33%) Row
  h += buildFooterRow('✅ Passed (≥ 33%)', (type, id, mm) => {
    if (type === 'ct_test' || type === 'pt_test') return getStatsForTest(id, mm).passed;
    if (type === 'ct_tot' || type === 'ct_avg') return getStatsForCTTotal().passed;
    if (type === 'over_tot' || type === 'over_pct') return getStatsForOverall().passed;
  });

  // 5. Failed (< 33%) Row
  h += buildFooterRow('❌ Failed (&lt; 33%)', (type, id, mm) => {
    if (type === 'ct_test' || type === 'pt_test') return getStatsForTest(id, mm).failed;
    if (type === 'ct_tot' || type === 'ct_avg') return getStatsForCTTotal().failed;
    if (type === 'over_tot' || type === 'over_pct') return getStatsForOverall().failed;
  });

  // 6. Pass Percentage Row
  h += buildFooterRow('📈 Pass Percentage', (type, id, mm) => {
    if (type === 'ct_test' || type === 'pt_test') return getStatsForTest(id, mm).pct;
    if (type === 'ct_tot' || type === 'ct_avg') return getStatsForCTTotal().pct;
    if (type === 'over_tot' || type === 'over_pct') return getStatsForOverall().pct;
  });

  h += '</tfoot></table>';
  return h;
}

function buildRank(){
  const ranked=rows.slice().sort((a,b)=>{if(a.pct===null&&b.pct===null)return 0;if(a.pct===null)return 1;if(b.pct===null)return-1;return b.pct-a.pct;});
  let rk=1;
  ranked.forEach((r,i)=>{if(i>0&&r.pct!==null&&ranked[i-1].pct!==null&&r.pct<ranked[i-1].pct)rk=i+1;r.rank=r.pct!==null?rk:'-';});
  const med=['&#127945;','&#127946;','&#127947;'];
  let h='<table><thead><tr class="h-lbl"><th>Rank</th><th>Student Name</th><th>S.No</th><th>Scored</th><th>Out Of</th><th>%</th><th>Remark</th><th style="width:130px;min-width:130px;">Parent\'s Sign</th></tr></thead><tbody>';
  ranked.forEach(r=>{
    const rnk=typeof r.rank==='number'&&r.rank<=3?med[r.rank-1]:r.rank;
    const c2=r.pct!==null?pc(r.pct):'';
    const rm=r.pct===null?'Absent in all tests':r.pct>=75?'Excellent &#127775;':r.pct>=60?'Good &#128077;':r.pct>=45?'Average':'Needs Improvement &#9888;';
    h+='<tr><td class="rank-gold">'+rnk+'</td><td>'+r.name+'</td><td>'+r.sno+'</td>';
    h+='<td class="tot">'+(r.pos>0?r.tot:'—')+'</td><td style="color:#9ca3af">'+(r.pos>0?r.pos:'—')+'</td>';
    h+=r.pct!==null?'<td class="pct '+c2+'">'+r.pct.toFixed(1)+'%</td>':'<td class="ab">—</td>';
    h+='<td style="font-size:.8em;color:#9ca3af;text-align:left;padding-left:8px">'+rm+'</td>';
    h+='<td class="sign-cell"></td></tr>';
  });
  h+='</tbody></table>';
  return h;
}

  document.getElementById('pageTitle').textContent = "PM SHRI KENDRIYA VIDYALAYA RANIKHET — " + activeClassLabel + " PTM Sheet";
